<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GitHub Multi-User Task Manager</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
.column{min-height:300px;}
.task{cursor:grab;}
.user-tab{transition: all 0.2s;}
.user-tab.bg-blue-500{font-weight:bold;}
</style>
</head>
<body class="bg-slate-100 min-h-screen p-6" id="body">
<div class="max-w-7xl mx-auto">

<!-- User Tabs -->
<div class="flex gap-2 mb-4" id="userTabs">
  <button onclick="switchUser('Owen')" class="user-tab bg-blue-500 text-white px-3 py-1 rounded">Owen</button>
  <button onclick="switchUser('Lucy')" class="user-tab bg-gray-400 text-white px-3 py-1 rounded">Lucy</button>
  <button onclick="switchUser('Nick')" class="user-tab bg-gray-400 text-white px-3 py-1 rounded">Nick</button>
</div>

<div class="flex justify-between items-center mb-6">
<h1 class="text-2xl font-bold">Task Manager GitHub</h1>
<div class="flex gap-2">
<button onclick="toggleView()" class="bg-blue-600 text-white px-3 py-2 rounded">Toggle View</button>
<button onclick="toggleDark()" class="bg-slate-700 text-white px-3 py-2 rounded">Dark Mode</button>
<button onclick="addTask(currentUser)" class="bg-green-600 text-white px-3 py-2 rounded">New Task</button>
</div>
</div>

<div class="flex gap-3 mb-6 flex-wrap">
<input id="search" placeholder="Search tasks..." class="border rounded px-3 py-2 w-64">
<select id="filter" class="border rounded px-3 py-2">
<option value="All">All Status</option>
<option>Incomplete</option>
<option>In Progress</option>
<option>Completed</option>
<option>Needs Action</option>
</select>
</div>

<div id="listView" class="space-y-3"></div>

<div id="boardView" class="grid md:grid-cols-4 gap-4 hidden">
<div class="bg-white rounded shadow p-3 column" data-status="Incomplete"><h2 class="font-bold mb-2">Incomplete</h2></div>
<div class="bg-white rounded shadow p-3 column" data-status="In Progress"><h2 class="font-bold mb-2">In Progress</h2></div>
<div class="bg-white rounded shadow p-3 column" data-status="Needs Action"><h2 class="font-bold mb-2">Needs Action</h2></div>
<div class="bg-white rounded shadow p-3 column" data-status="Completed"><h2 class="font-bold mb-2">Completed</h2></div>
</div>
</div>

<script>
// ===== CONFIG =====
const OWNER = "Quizheadsboardgame";
const REPO = "task-manager";
const FILE_PATH = "tasks.json";
const TOKEN = "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";

let tasks = [];
let boardMode = false;
let sha = null;
let currentUser = "Owen";

// ===== GITHUB API =====
async function fetchTasks(){
    const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE_PATH}`);
    const data = await res.json();
    const content = atob(data.content);
    sha = data.sha;
    tasks = JSON.parse(content);
}

async function saveTasks(){
    try {
        const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE_PATH}`, {
            method: "PUT",
            headers: {
                "Authorization": `token ${TOKEN}`,
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                message: "Update tasks",
                content: btoa(JSON.stringify(tasks, null, 2)),
                sha: sha
            })
        });
        const data = await res.json();
        if(data.content && data.content.sha){
            sha = data.content.sha;  // update SHA for next save
        } else {
            console.error("GitHub save failed:", data);
            alert("Error saving tasks. Check token or repo permissions.");
        }
    } catch(e){
        console.error("Save error:", e);
        alert("Error saving tasks to GitHub.");
    }
}

// ===== UI =====
const listView = document.getElementById("listView");
const boardView = document.getElementById("boardView");
const search = document.getElementById("search");
const filter = document.getElementById("filter");

function createTaskCard(t){
    let card = document.createElement("div");
    card.className = "task bg-white p-3 rounded shadow mb-2";
    card.draggable = true;
    card.dataset.id = t.id;
    card.innerHTML = `
        <input value="${t.task}" class="border rounded px-2 py-1 w-full mb-1">
        <div class="grid grid-cols-3 gap-1 text-sm">
            <select class="border rounded status">
                <option ${t.status=="Incomplete"?"selected":""}>Incomplete</option>
                <option ${t.status=="In Progress"?"selected":""}>In Progress</option>
                <option ${t.status=="Needs Action"?"selected":""}>Needs Action</option>
                <option ${t.status=="Completed"?"selected":""}>Completed</option>
            </select>
            <select class="border rounded priority">
                <option ${t.priority=="Low"?"selected":""}>Low</option>
                <option ${t.priority=="Medium"?"selected":""}>Medium</option>
                <option ${t.priority=="High"?"selected":""}>High</option>
            </select>
            <input type="date" value="${t.due}" class="border rounded">
        </div>
        <input value="${t.notes}" placeholder="Notes..." class="border rounded px-2 py-1 mt-1 w-full">
        <button class="bg-red-500 text-white px-2 py-1 mt-2 rounded delete">Delete</button>
    `;

    const inputs = card.querySelectorAll("input");
    const selects = card.querySelectorAll("select");

    inputs[0].onchange = async e => { t.task=e.target.value; await saveTasks(); }
    inputs[1].onchange = async e => { t.due=e.target.value; await saveTasks(); render(); }
    inputs[2].onchange = async e => { t.notes=e.target.value; await saveTasks(); }

    selects[0].onchange = async e => { t.status=e.target.value; await saveTasks(); render(); }
    selects[1].onchange = async e => { t.priority=e.target.value; await saveTasks(); render(); }

    card.querySelector(".delete").onclick = async () => {
        tasks = tasks.filter(x => x.id != t.id);
        await saveTasks();
        render();
    }

    card.addEventListener("dragstart", e => e.dataTransfer.setData("id", t.id));
    return card;
}

// ===== RENDER WITH SORT =====
async function render(){
    listView.innerHTML = "";
    document.querySelectorAll(".column").forEach(c => { c.innerHTML = `<h2 class="font-bold mb-2">${c.dataset.status}</h2>`; });

    const s = search.value.toLowerCase();

    tasks
      .filter(t => t.user === currentUser)
      .filter(t => t.task.toLowerCase().includes(s) && (filter.value==="All" || t.status===filter.value))
      .sort((a,b)=>{
          const priorityOrder = {"High":1,"Medium":2,"Low":3};
          if(priorityOrder[a.priority] !== priorityOrder[b.priority]){
              return priorityOrder[a.priority] - priorityOrder[b.priority];
          }
          if(!a.due) return 1;
          if(!b.due) return -1;
          return new Date(a.due) - new Date(b.due);
      })
      .forEach(t=>{
          const card = createTaskCard(t);
          if(boardMode){
              const col = document.querySelector(`[data-status="${t.status}"]`);
              col.appendChild(card);
          } else {
              listView.appendChild(card);
          }
      });
}

// ===== CONTROLS =====
async function addTask(user=currentUser){
    if(!sha) await fetchTasks(); // ensure SHA available
    const newTask = {id:Date.now(), user, task:"New Task", status:"Incomplete", priority:"Low", due:"", notes:""};
    tasks.push(newTask);
    render();  // show immediately
    await saveTasks(); // save to GitHub
}

function toggleView(){
    boardMode = !boardMode;
    listView.classList.toggle("hidden");
    boardView.classList.toggle("hidden");
    render();
}

function toggleDark(){
    document.getElementById("body").classList.toggle("bg-slate-900");
    document.getElementById("body").classList.toggle("bg-slate-100");
}

// ===== User Tabs =====
function switchUser(user){
    currentUser = user;
    document.querySelectorAll(".user-tab").forEach(btn=>{
        if(btn.textContent === user){
            btn.classList.add("bg-blue-500", "text-white");
            btn.classList.remove("bg-gray-400");
        } else {
            btn.classList.remove("bg-blue-500", "text-white");
            btn.classList.add("bg-gray-400");
        }
    });
    render();
}

// ===== Drag & Drop Columns =====
document.querySelectorAll(".column").forEach(col => {
    col.addEventListener("dragover", e => e.preventDefault());
    col.addEventListener("drop", e => {
        const id = e.dataTransfer.getData("id");
        const task = tasks.find(t => t.id==id);
        task.status = col.dataset.status;
        render();
        saveTasks();
    });
});

// ===== Search / Filter =====
search.oninput = render;
filter.onchange = render;

// ===== INITIAL LOAD =====
async function init(){
    await fetchTasks();
    switchUser(currentUser); // highlight tab and render
}
init();
</script>
</body>
</html>
